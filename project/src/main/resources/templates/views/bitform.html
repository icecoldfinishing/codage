<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Manipulation de Bits</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Manipulation de Bits (POO)</h1>
    <form method="post" action="/result" class="mb-3">
        <div class="mb-3">
            <label for="value" class="form-label">Valeur (décimal)</label>
            <input type="number" class="form-control" id="value" name="value" required>
        </div>
        <div class="mb-3">
            <label for="method" class="form-label">Méthode</label>
            <select class="form-select" id="method" name="method" required onchange="toggleParam()">
                <option value="shiftLeft">Décalage à gauche</option>
                <option value="shiftRight">Décalage à droite</option>
                <option value="invertBits">Inversion des bits</option>
                <option value="andBits">ET binaire</option>
                <option value="orBits">OU binaire</option>
                <option value="toBinary">Vers binaire</option>
                <option value="fromBinary">Depuis binaire</option>
            </select>
        </div>
        <div class="mb-3" id="paramDiv">
            <label for="param" class="form-label">Paramètre (optionnel)</label>
            <input type="number" class="form-control" id="param" name="param">
        </div>
        <button type="submit" class="btn btn-primary">Calculer</button>
    </form>
    <div>
        <h3>Résultat :</h3>
        <div class="alert alert-info">[[${result}]]</div>
    </div>
    <script>
        function toggleParam() {
            var method = document.getElementById('method').value;
            var paramDiv = document.getElementById('paramDiv');
            if (method === 'invertBits' || method === 'toBinary') {
                paramDiv.style.display = 'none';
            } else {
                paramDiv.style.display = 'block';
            }
        }
        window.onload = toggleParam;
    </script>
</body>
</html>
