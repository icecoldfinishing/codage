# ============================================
# Configuration Spring Boot - Vroomer
# ============================================

# Server Configuration
# Bind to Render's assigned PORT when present, default to 8088 locally
server.port=${PORT:8088}



# Static Resources
spring.web.resources.static-locations=classpath:/static/

# Jackson JSON Configuration
spring.jackson.serialization.fail-on-empty-beans=false

# Token de sécurité pour les appels API vers le BackOffice
security.token=FRONT-KEY-PUBLIC